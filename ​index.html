<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>code ERROR · AI Coding Tutor</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- CodeMirror (lightweight, mobile-friendly) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/material-darker.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background-color: #1e1e1e;
      color: #d4d4d4;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background-color: #252526;
      border-bottom: 1px solid #3c3c3c;
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .logo {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: 1.3rem;
      font-weight: 700;
    }
    .logo i {
      color: #007acc;
    }
    .app-name {
      background: linear-gradient(135deg, #fff, #9cdcfe);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .analyze-btn {
      background: #0e639c;
      border: none;
      color: white;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 8px 16px;
      border-radius: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: 0.2s;
    }
    .analyze-btn:active {
      transform: scale(0.96);
    }

    /* Main layout */
    .main-split {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Editor area */
    .editor-area {
      flex: 1;
      min-height: 40%;
      border-bottom: 1px solid #3c3c3c;
      display: flex;
      flex-direction: column;
    }
    .editor-header {
      background: #252526;
      padding: 6px 12px;
      font-size: 0.7rem;
      display: flex;
      gap: 8px;
    }
    .editor-header span {
      background: #2d2d2d;
      padding: 2px 8px;
      border-radius: 16px;
    }
    .CodeMirror {
      height: 100%;
      font-size: 14px;
    }

    /* Output area */
    .output-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: #1e1e1e;
    }

    /* Cards */
    .error-card {
      background: #252526;
      border-left: 4px solid #f48771;
      border-radius: 12px;
      padding: 14px 18px;
    }
    .error-card h3 {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #f48771;
      margin-bottom: 10px;
      display: flex;
      gap: 8px;
    }
    .error-message {
      font-family: monospace;
      background: #1e1e1e;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #3c3c3c;
      word-break: break-word;
    }

    .explanation-section {
      background: #252526;
      border-radius: 12px;
      padding: 14px 18px;
    }
    .explanation-section h3 {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #9cdcfe;
      margin-bottom: 12px;
      display: flex;
      gap: 8px;
    }
    #explanation-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #explanation-list li {
      background: #1e1e1e;
      border: 1px solid #3c3c3c;
      border-radius: 8px;
      padding: 10px;
      font-size: 0.85rem;
    }

    .loading-status {
      background: #2d2d2d;
      border-left: 4px solid #007acc;
      padding: 12px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
<div class="header">
  <div class="logo">
    <i class="fas fa-code"></i>
    <span class="app-name">code ERROR</span>
  </div>
  <button class="analyze-btn" id="analyzeBtn">
    <i class="fas fa-magic"></i> Analyze & Fix
  </button>
</div>

<div class="main-split">
  <div class="editor-area">
    <div class="editor-header">
      <span><i class="fab fa-python"></i> Python (buggy)</span>
      <span><i class="fas fa-exclamation-triangle"></i> missing colon</span>
    </div>
    <textarea id="code-editor"></textarea>
  </div>
  <div class="output-area">
    <div id="loading-status" class="loading-status hidden">
      <i class="fas fa-spinner fa-pulse"></i> Gemini AI is analyzing...
    </div>
    <div class="error-card">
      <h3><i class="fas fa-bug"></i> Error Type</h3>
      <div id="error-display" class="error-message">— Waiting —</div>
    </div>
    <div class="explanation-section">
      <h3><i class="fas fa-list-ol"></i> Step‑by‑Step Explanation</h3>
      <ul id="explanation-list">
        <li>Click "Analyze & Fix Code" to see AI insights</li>
      </ul>
    </div>
  </div>
</div>

<script>
  // ==================== 🔑 YOUR GEMINI API KEY (replace if needed) ====================
  const GEMINI_API_KEY = "AQ.Ab8RN6ImuFGUB8VsH0OrxqoOOVjXiEKY8qZyL5l6aa7-wXeZ3w";

  // ==================== SETUP CODEMIRROR (mobile-friendly) ====================
  const buggyCode = `def calculate_average(numbers):
    total = 0
    # BUG: missing colon ':' after 'for num in numbers'
    for num in numbers
        total += num
    average = total / len(numbers)
    return average

scores = [85, 92, 78, 90, 88]
result = calculate_average(scores)
print(f"Class average: {result}")
`;

  const textarea = document.getElementById('code-editor');
  const editor = CodeMirror.fromTextArea(textarea, {
    mode: 'python',
    theme: 'material-darker',
    lineNumbers: true,
    autoCloseBrackets: true,
    indentUnit: 4,
    tabSize: 4,
    lineWrapping: true,
    viewportMargin: Infinity
  });
  editor.setValue(buggyCode);
  // Force resize on mobile
  setTimeout(() => editor.refresh(), 100);

  // ==================== UI ELEMENTS ====================
  const analyzeBtn = document.getElementById('analyzeBtn');
  const loadingDiv = document.getElementById('loading-status');
  const errorDisplayDiv = document.getElementById('error-display');
  const explanationUl = document.getElementById('explanation-list');

  function showLoading() {
    loadingDiv.classList.remove('hidden');
    errorDisplayDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Analyzing...';
    explanationUl.innerHTML = '<li><i class="fas fa-spinner fa-pulse"></i> AI is thinking...</li>';
  }
  function hideLoading() {
    loadingDiv.classList.add('hidden');
  }
  function displayResults(errorType, steps) {
    errorDisplayDiv.innerHTML = errorType || 'Unknown error';
    explanationUl.innerHTML = '';
    if (steps && steps.length) {
      steps.forEach(step => {
        const li = document.createElement('li');
        li.textContent = step;
        explanationUl.appendChild(li);
      });
    } else {
      explanationUl.innerHTML = '<li>⚠️ No explanation received.</li>';
    }
  }
  function displayError(msg) {
    errorDisplayDiv.innerHTML = `⚠️ ${msg}`;
    explanationUl.innerHTML = '<li>❌ Analysis failed. Check console or API key.</li>';
  }

  // ==================== GEMINI API ====================
  async function callGemini(code) {
    const systemPrompt = `You are a strict coding tutor. Analyze the provided code for errors. Return ONLY a valid JSON object without any markdown. The JSON must follow: {"error_type": "string", "step_by_step_explanation": ["string", "string"]}.`;
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
    const payload = {
      system_instruction: { parts: [{ text: systemPrompt }] },
      contents: [{ role: "user", parts: [{ text: `Python code:\n${code}` }] }],
      generationConfig: { temperature: 0.2 }
    };
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) throw new Error('Empty response');
    let clean = text.trim();
    if (clean.startsWith('```json')) clean = clean.replace(/```json\n?/, '').replace(/```\n?/, '');
    else if (clean.startsWith('```')) clean = clean.replace(/```\n?/g, '');
    const parsed = JSON.parse(clean);
    if (!parsed.error_type || !Array.isArray(parsed.step_by_step_explanation)) throw new Error('Invalid JSON');
    return parsed;
  }

  // ==================== BUTTON CLICK ====================
  analyzeBtn.addEventListener('click', async () => {
    const currentCode = editor.getValue();
    console.log('📝 Code:', currentCode);
    showLoading();
    try {
      const result = await callGemini(currentCode);
      displayResults(result.error_type, result.step_by_step_explanation);
    } catch (err) {
      console.error(err);
      displayError(err.message);
    } finally {
      hideLoading();
    }
  });
</script>
</body>
</html>
